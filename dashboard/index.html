<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        walker: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
        surface: { 800: '#1a1d27', 900: '#13151d', 950: '#0f1117' }
      }
    }
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', system-ui, sans-serif; }
img.emoji { display: inline; height: 1.2em; width: 1.2em; vertical-align: -0.2em; margin: 0 1px; }
</style>
</head>
<body class="bg-surface-950 text-gray-200 min-h-screen">

<!-- Nav -->
<nav class="bg-surface-900 border-b border-gray-800 px-6 flex items-center justify-between h-12">
  <div class="flex items-center gap-1 h-full">
    <!-- Logo -->
    <a href="/" class="flex items-center gap-2 mr-5 group">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="text-walker-500">
        <circle cx="12" cy="4.5" r="2.5" fill="currentColor"/>
        <path d="M15.5 9.5C14.5 8.5 13.3 8 12 8C10.7 8 9.5 8.5 8.5 9.5L6 12L7.4 13.4L9.5 11.3V22H11.5V17H12.5V22H14.5V11.3L16.6 13.4L18 12L15.5 9.5Z" fill="currentColor"/>
      </svg>
      <span class="text-walker-500 font-bold text-base group-hover:text-walker-600 transition-colors">Walker</span>
    </a>
    <!-- Tabs -->
    <a id="tab-leaderboard" href="/" class="nav-tab">Leaderboard</a>
    <a id="tab-activity" href="/activity" class="nav-tab" style="display:none">Activity</a>
  </div>
  <!-- Right: avatar or login -->
  <div id="nav-user" class="flex items-center"></div>
</nav>

<style>
  .nav-tab {
    display: flex; align-items: center; height: 100%;
    padding: 0 16px; cursor: pointer; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; color: #666;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .nav-tab:hover { color: #aaa; }
  .nav-tab.active { color: #22c55e; border-bottom-color: #22c55e; }
  .segment-row {
    display: grid;
    grid-template-columns: 16px 100px 100px 80px 80px 72px 64px 48px;
    align-items: center;
    gap: 0 12px;
  }
</style>

<!-- Leaderboard page -->
<div id="page-leaderboard" class="page px-6 pb-8 hidden">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
    <div class="bg-surface-800 rounded-xl p-5">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">Today</h3>
      <div id="lb-today" class="space-y-1"><div class="text-gray-600 text-sm italic">No data yet</div></div>
    </div>
    <div class="bg-surface-800 rounded-xl p-5">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">This Week</h3>
      <div id="lb-weekly" class="space-y-1"><div class="text-gray-600 text-sm italic">No data yet</div></div>
    </div>
    <div class="bg-surface-800 rounded-xl p-5">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">All Time</h3>
      <div id="lb-alltime" class="space-y-1"><div class="text-gray-600 text-sm italic">No data yet</div></div>
    </div>
  </div>
</div>

<!-- Profile page -->
<div id="page-profile" class="page px-6 pb-8 hidden">
  <div id="profile-content" class="mt-4"></div>
</div>

<!-- Activity page -->
<div id="page-activity" class="page px-6 pb-8 hidden">
  <h2 id="activity-heading" class="text-lg font-bold text-white mt-4 mb-4">Today's Activity</h2>
  <div id="activity-live" class="mb-2"></div>
  <div id="activity-closed"></div>
</div>

<script src="/app.js"></script>
</body>
</html>
