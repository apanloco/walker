<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        walker: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
        surface: { 800: '#1a1d27', 900: '#13151d', 950: '#0f1117' }
      }
    }
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', system-ui, sans-serif; }
img.emoji { display: inline; height: 1.2em; width: 1.2em; vertical-align: -0.2em; margin: 0 1px; }
</style>
</head>
<body class="bg-surface-950 text-gray-200 min-h-screen">

<!-- Nav -->
<nav class="bg-surface-900 border-b border-gray-800 px-6 flex items-center justify-between">
  <div class="flex items-center gap-1">
    <span class="text-walker-500 font-bold text-lg mr-4 py-3">Walker</span>
    <a id="tab-leaderboard" class="nav-tab active" onclick="showTab('leaderboard')">Leaderboard</a>
  </div>
  <div id="nav-user" class="text-sm text-gray-400"></div>
</nav>

<style>
  .nav-tab {
    padding: 12px 16px; cursor: pointer; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; color: #666;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .nav-tab:hover { color: #aaa; }
  .nav-tab.active { color: #22c55e; border-bottom-color: #22c55e; }
</style>

<!-- Connection status -->
<div id="connection-status" class="text-xs px-6 py-1 text-gray-600">Connecting...</div>

<!-- Leaderboard page -->
<div id="page-leaderboard" class="page px-6 pb-8 hidden">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
    <div class="bg-surface-800 rounded-xl p-5">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">Today</h3>
      <div id="lb-today" class="space-y-1"><div class="text-gray-600 text-sm italic">No data yet</div></div>
    </div>
    <div class="bg-surface-800 rounded-xl p-5">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">This Week</h3>
      <div id="lb-weekly" class="space-y-1"><div class="text-gray-600 text-sm italic">No data yet</div></div>
    </div>
    <div class="bg-surface-800 rounded-xl p-5">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">All Time</h3>
      <div id="lb-alltime" class="space-y-1"><div class="text-gray-600 text-sm italic">No data yet</div></div>
    </div>
  </div>
</div>

<!-- Me page -->
<div id="page-profile" class="page px-6 pb-8 hidden">
  <div id="profile-content" class="mt-4"></div>
</div>

<script src="/app.js"></script>
</body>
</html>
